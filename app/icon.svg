<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="REDTHREAD">
  <title>REDTHREAD</title>
  <defs>
    <radialGradient id="tile" cx="0.34" cy="0.28" r="0.95">
      <stop offset="0" stop-color="#241f19"/>
      <stop offset="1" stop-color="#141110"/>
    </radialGradient>
    <radialGradient id="coreglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#EA4A2E" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#EA4A2E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="strand" cx="256" cy="256" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4583B"/>
      <stop offset="0.6" stop-color="#C62B20"/>
      <stop offset="1" stop-color="#9E1F16"/>
    </radialGradient>
    <radialGradient id="core" cx="0.4" cy="0.36" r="0.75">
      <stop offset="0" stop-color="#FF6A4D"/>
      <stop offset="1" stop-color="#C62B20"/>
    </radialGradient>
  </defs>

  <!-- dossier tile -->
  <rect x="20" y="20" width="472" height="472" rx="116" fill="url(#tile)"/>
  <rect x="20.75" y="20.75" width="470.5" height="470.5" rx="115.25" fill="none" stroke="#3c322a" stroke-width="1.5"/>

  <!-- the node lit from within -->
  <circle cx="256" cy="256" r="196" fill="url(#coreglow)"/>

  <!-- red string out to four pinned pieces of evidence (straight, hand-strung) -->
  <g stroke="url(#strand)" stroke-width="26" stroke-linecap="round">
    <line x1="256" y1="256" x2="116" y2="132"/>
    <line x1="256" y1="256" x2="400" y2="150"/>
    <line x1="256" y1="256" x2="128" y2="392"/>
    <line x1="256" y1="256" x2="388" y2="382"/>
  </g>

  <!-- the pinned pieces -->
  <g fill="#BE2A1F">
    <circle cx="116" cy="132" r="29"/>
    <circle cx="400" cy="150" r="29"/>
    <circle cx="128" cy="392" r="29"/>
    <circle cx="388" cy="382" r="29"/>
  </g>
  <g fill="#FF9077" opacity="0.7">
    <circle cx="107" cy="123" r="8"/>
    <circle cx="391" cy="141" r="8"/>
    <circle cx="119" cy="383" r="8"/>
    <circle cx="379" cy="373" r="8"/>
  </g>

  <!-- the nexus pin -->
  <circle cx="256" cy="256" r="58" fill="url(#core)"/>
  <circle cx="234" cy="234" r="16" fill="#FFD2C4" opacity="0.9"/>
</svg>
